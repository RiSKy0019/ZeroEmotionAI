<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Journal — Trading Journal & Analytics</title>
  <meta name="description" content="Plan your trades, review your performance, and course-correct your mistakes. A self-hosted trading journal inspired by TradeZella." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- App shell -->
  <div id="app" class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="brand-mark">⚡</div>
        <div class="brand-text">
          <span class="brand-name">Edge Journal</span>
          <span class="brand-tag">Plan · Review · Improve</span>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a class="nav__item" data-route="dashboard"><span class="nav__icon">▦</span> Dashboard</a>
        <a class="nav__item" data-route="trades"><span class="nav__icon">▤</span> Trades</a>
        <a class="nav__item" data-route="planning"><span class="nav__icon">◎</span> Planning</a>
        <a class="nav__item" data-route="playbooks"><span class="nav__icon">📘</span> Playbooks</a>
        <a class="nav__item" data-route="reports"><span class="nav__icon">📈</span> Reports</a>
        <a class="nav__item" data-route="journal"><span class="nav__icon">✎</span> Journal &amp; Review</a>
      </nav>

      <div class="sidebar__footer">
        <button class="btn btn--ghost btn--block" id="exportBtn" title="Download a JSON backup of your data">⭳ Export data</button>
        <label class="btn btn--ghost btn--block" title="Restore data from a JSON backup">
          ⭱ Import data
          <input type="file" id="importInput" accept="application/json" hidden />
        </label>
        <button class="btn btn--danger-ghost btn--block" id="resetBtn" title="Wipe everything and reload sample data">⟲ Reset / reseed</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn topbar__menu" id="menuToggle" aria-label="Toggle menu">☰</button>
        <div class="topbar__title" id="pageTitle">Dashboard</div>

        <div class="topbar__controls">
          <div class="select-wrap">
            <label class="select-label">Account</label>
            <select id="accountSelect" class="select"></select>
          </div>
          <div class="select-wrap">
            <label class="select-label">Range</label>
            <select id="rangeSelect" class="select">
              <option value="all">All time</option>
              <option value="ytd">Year to date</option>
              <option value="30">Last 30 days</option>
              <option value="7">Last 7 days</option>
            </select>
          </div>
          <button class="btn btn--primary" id="addTradeBtn">+ Add Trade</button>
        </div>
      </header>

      <main class="content" id="view"><!-- views render here --></main>
    </div>
  </div>

  <!-- Modal root -->
  <div class="modal-root" id="modalRoot" aria-hidden="true"></div>
  <!-- Toast root -->
  <div class="toast-root" id="toastRoot"></div>

  <!-- Chart.js (loads from CDN in your browser; app degrades gracefully if offline) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App scripts (classic scripts so it runs from file:// without a server) -->
  <script src="assets/js/store.js"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/util.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/views.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
