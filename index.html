<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropFirmEdge — Trading Journal & Analytics</title>
  <meta name="description" content="Plan, review and course-correct your trading. Journaling, analytics, reports, playbooks and CSV import." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Urbanist (headings) + Inter (body) — matching Alpha Futures typography -->
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('zea.theme') || 'dark';
        document.documentElement.classList.toggle('dark', t !== 'light');
      } catch (e) {}
    })();
  </script>

  <!-- Tailwind (Play CDN — no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans:    ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            heading: ['Urbanist', 'Inter', 'ui-sans-serif', 'sans-serif']
          },
          colors: {
            ink: {
              950: '#0a0a0a', 900: '#111111', 850: '#1b1b1b',
              800: '#222222', 750: '#2a2a2a', 700: '#333333',
              600: '#444444', 500: '#666666', 400: '#888888'
            },
            brand: {
              DEFAULT: '#00E096', 300: '#7fffd0', 400: '#33e8a8',
              500: '#00E096', 600: '#00B67A', 700: '#008f5e'
            },
            accentpink: '#00B67A',
            profit: { DEFAULT: '#00E096', light: '#33e8a8' },
            loss:   { DEFAULT: '#f6465d', light: '#ff6b7a' },
            warn:   { DEFAULT: '#f0a32a' }
          },
          boxShadow: {
            glow:      '0 0 20px rgba(0,224,150,0.30)',
            'glow-sm': '0 0 10px rgba(0,224,150,0.20)',
            card:      '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
            'card-lg': '0 6px 20px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05)',
            'inset-brand': 'inset 0 0 0 1px rgba(0,224,150,0.35)'
          },
          borderRadius: { '2xl': '14px', '3xl': '18px', '4xl': '24px' },
          keyframes: {
            'fade-in'  : { '0%': { opacity: 0, transform: 'translateY(8px)' },  '100%': { opacity: 1, transform: 'none' } },
            'fade-up'  : { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'none' } },
            'scale-in' : { '0%': { opacity: 0, transform: 'scale(.97)' },       '100%': { opacity: 1, transform: 'scale(1)' } },
            'slide-in' : { '0%': { opacity: 0, transform: 'translateX(-10px)' },'100%': { opacity: 1, transform: 'none' } },
            'pulse-dot': { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.4 } }
          },
          animation: {
            'fade-in'  : 'fade-in  .20s ease both',
            'fade-up'  : 'fade-up  .28s ease both',
            'scale-in' : 'scale-in .16s ease both',
            'slide-in' : 'slide-in .18s ease both',
            'pulse-dot': 'pulse-dot 2s ease-in-out infinite'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-ink-950 dark:text-slate-100 font-sans antialiased">
  <div id="root"></div>

  <!-- Libraries (load in the browser; the app degrades gracefully if a CDN is blocked) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App (classic scripts; each file is an IIFE attaching to window namespaces) -->
  <!-- ?v= cache-buster: bump this number whenever JS changes so browsers/Pages CDN don't serve stale files -->
  <script src="assets/js/base.js?v=2"></script>
  <script src="assets/js/format.js?v=2"></script>
  <script src="assets/js/store.js?v=2"></script>
  <script src="assets/js/seed.js?v=2"></script>
  <script src="assets/js/charts.js?v=2"></script>
  <script src="assets/js/tvimport.js?v=2"></script>
  <script src="assets/js/insights.js?v=2"></script>
  <script src="assets/js/components.js?v=2"></script>
  <script src="assets/js/view.dashboard.js?v=2"></script>
  <script src="assets/js/view.trades.js?v=2"></script>
  <script src="assets/js/view.reports.js?v=2"></script>
  <script src="assets/js/view.insights.js?v=2"></script>
  <script src="assets/js/chat.js?v=2"></script>
  <script src="assets/js/view.chat.js?v=2"></script>
  <script src="assets/js/view.weekly.js?v=2"></script>
  <script src="assets/js/view.notebook.js?v=2"></script>
  <script src="assets/js/view.playbooks.js?v=2"></script>
  <script src="assets/js/view.journal.js?v=2"></script>
  <script src="assets/js/view.propfirm.js?v=2"></script>
  <script src="assets/js/propfirm-import.js?v=2"></script>
  <script src="assets/js/view.propfirm-import.js?v=2"></script>
  <script src="assets/js/app.js?v=2"></script>
</body>
</html>
