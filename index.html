<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroEmotionAI — Trading Journal & Analytics</title>
  <meta name="description" content="Plan, review and course-correct your trading. Journaling, analytics, reports, playbooks and CSV import." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('zea.theme') || 'dark';
        document.documentElement.classList.toggle('dark', t !== 'light');
      } catch (e) {}
    })();
  </script>

  <!-- Tailwind (Play CDN — no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            /* dark surface palette — tight layered greys like TradeZella */
            ink: {
              950: '#07070e', 900: '#0c0c14', 850: '#101019',
              800: '#13131e', 750: '#181825', 700: '#1e1e2d',
              600: '#252535', 500: '#2e2e42', 400: '#3b3b52'
            },
            /* brand violet */
            brand: { DEFAULT: '#7c5cff', 300: '#c4b5ff', 400: '#a68fff', 500: '#7c5cff', 600: '#6b4cf0', 700: '#5638d9' },
            accentpink: '#d946b8',
            /* semantic */
            profit: { DEFAULT: '#0ecb81', light: '#13f09b' },
            loss:   { DEFAULT: '#f6465d', light: '#ff6b7a'  },
            warn:   { DEFAULT: '#f0a32a' }
          },
          boxShadow: {
            glow:     '0 0 24px rgba(124,92,255,0.45)',
            'glow-sm':'0 0 12px rgba(124,92,255,0.30)',
            card:     '0 2px 8px rgba(0,0,0,0.20), 0 1px 2px rgba(0,0,0,0.12)',
            'card-lg':'0 8px 32px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.16)',
            'inset-brand': 'inset 0 0 0 1px rgba(124,92,255,0.4)'
          },
          borderRadius: { '2xl': '16px', '3xl': '20px', '4xl': '28px' },
          keyframes: {
            'fade-in'  : { '0%': { opacity: 0, transform: 'translateY(8px)' },  '100%': { opacity: 1, transform: 'none' } },
            'fade-up'  : { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'none' } },
            'scale-in' : { '0%': { opacity: 0, transform: 'scale(.96)' },       '100%': { opacity: 1, transform: 'scale(1)' } },
            'slide-in' : { '0%': { opacity: 0, transform: 'translateX(-12px)' },'100%': { opacity: 1, transform: 'none' } },
            'pulse-dot': { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.4 } }
          },
          animation: {
            'fade-in'  : 'fade-in  .22s ease both',
            'fade-up'  : 'fade-up  .30s ease both',
            'scale-in' : 'scale-in .18s ease both',
            'slide-in' : 'slide-in .20s ease both',
            'pulse-dot': 'pulse-dot 2s ease-in-out infinite'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-ink-950 dark:text-slate-100 font-sans antialiased">
  <div id="root"></div>

  <!-- Libraries (load in the browser; the app degrades gracefully if a CDN is blocked) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App (classic scripts; each file is an IIFE attaching to window namespaces) -->
  <script src="assets/js/base.js"></script>
  <script src="assets/js/format.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/tvimport.js"></script>
  <script src="assets/js/insights.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/view.dashboard.js"></script>
  <script src="assets/js/view.trades.js"></script>
  <script src="assets/js/view.reports.js"></script>
  <script src="assets/js/view.weekly.js"></script>
  <script src="assets/js/view.notebook.js"></script>
  <script src="assets/js/view.playbooks.js"></script>
  <script src="assets/js/view.journal.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
