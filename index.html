<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroEmotionAI — Trading Journal & Analytics</title>
  <meta name="description" content="Plan, review and course-correct your trading. Journaling, analytics, reports, playbooks and CSV import." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('zea.theme') || 'dark';
        document.documentElement.classList.toggle('dark', t !== 'light');
      } catch (e) {}
    })();
  </script>

  <!-- Tailwind (Play CDN — no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: {
            ink: {
              950: '#0a0a10', 900: '#0d0d15', 850: '#11111a',
              800: '#15151f', 750: '#1a1a26', 700: '#1d1d2b',
              600: '#262633', 500: '#2f2f40', 400: '#3a3a4d'
            },
            brand: { DEFAULT: '#7c5cff', 300: '#b3a0ff', 400: '#9b7bff', 500: '#7c5cff', 600: '#6b4cf0', 700: '#5a3ddb' },
            accentpink: '#e15cc8',
            profit: { DEFAULT: '#16c784', soft: 'rgba(22,199,132,0.14)' },
            loss: { DEFAULT: '#ea3943', soft: 'rgba(234,57,67,0.14)' },
            amber: { DEFAULT: '#f0a32a' }
          },
          boxShadow: {
            glow: '0 8px 30px rgba(124,92,255,0.35)',
            card: '0 10px 30px rgba(0,0,0,0.25)'
          },
          keyframes: {
            'fade-in': { '0%': { opacity: 0, transform: 'translateY(6px)' }, '100%': { opacity: 1, transform: 'none' } },
            'scale-in': { '0%': { opacity: 0, transform: 'scale(.97)' }, '100%': { opacity: 1, transform: 'scale(1)' } }
          },
          animation: { 'fade-in': 'fade-in .25s ease', 'scale-in': 'scale-in .18s ease' }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-ink-950 dark:text-slate-100 font-sans antialiased">
  <div id="root"></div>

  <!-- Libraries (load in the browser; the app degrades gracefully if a CDN is blocked) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- App (classic scripts; each file is an IIFE attaching to window namespaces) -->
  <script src="assets/js/base.js"></script>
  <script src="assets/js/format.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/charts.js"></script>
  <script src="assets/js/tvimport.js"></script>
  <script src="assets/js/insights.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/view.dashboard.js"></script>
  <script src="assets/js/view.trades.js"></script>
  <script src="assets/js/view.reports.js"></script>
  <script src="assets/js/view.playbooks.js"></script>
  <script src="assets/js/view.journal.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
